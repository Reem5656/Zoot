<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>זכויותAI – המדריך האישי שלך</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(100,200,255,0.15);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(90deg, #64c8ff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo span { font-weight: 300; }

    nav a {
      color: #9ca3af;
      text-decoration: none;
      margin-right: 24px;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    nav a:hover { color: #64c8ff; }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      padding: 80px 20px 60px;
      background: radial-gradient(ellipse at top, #1a2a4a 0%, transparent 70%);
    }

    .hero-badge {
      display: inline-block;
      background: rgba(100,200,255,0.1);
      border: 1px solid rgba(100,200,255,0.3);
      color: #64c8ff;
      padding: 6px 18px;
      border-radius: 50px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, #a0c4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 1.15rem;
      color: #9ca3af;
      max-width: 560px;
      margin: 0 auto 36px;
      line-height: 1.7;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      border: none;
      padding: 16px 40px;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 24px rgba(59,130,246,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(59,130,246,0.5);
    }

    /* ===== QUIZ SECTION ===== */
    #quiz-section {
      display: none;
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .progress-container {
      margin-bottom: 32px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    .question-number {
      font-size: 0.8rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    .question-card h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f3f4f6;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .question-card .subtitle {
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .options-grid.single-col {
      grid-template-columns: 1fr;
    }

    .option-btn {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.1);
      color: #d1d5db;
      padding: 16px 20px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 0.95rem;
      text-align: right;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .option-btn:hover {
      background: rgba(59,130,246,0.1);
      border-color: #3b82f6;
      color: #fff;
      transform: translateX(-3px);
    }

    .option-btn.selected {
      background: rgba(59,130,246,0.15);
      border-color: #3b82f6;
      color: #60a5fa;
    }

    .option-icon { font-size: 1.3rem; }

    .slider-container {
      padding: 10px 0;
    }

    .slider-value {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 800;
      color: #60a5fa;
      margin-bottom: 16px;
    }

    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      height: 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(59,130,246,0.5);
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 8px;
    }

    .income-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 1.1rem;
      color: #f3f4f6;
      outline: none;
      transition: border-color 0.3s;
      direction: ltr;
      text-align: center;
    }

    .income-input:focus { border-color: #3b82f6; }

    .nav-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-back {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #9ca3af;
      padding: 14px 28px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.25s;
    }

    .btn-back:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .btn-next {
      flex: 1;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border: none;
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
    }

    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(59,130,246,0.4); }

    /* ===== RESULTS ===== */
    #results-section {
      display: none;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .results-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .results-header .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #4ade80;
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .results-header h2 {
      font-size: 2rem;
      font-weight: 800;
      color: #f3f4f6;
      margin-bottom: 10px;
    }

    .results-header p {
      color: #6b7280;
      font-size: 1rem;
    }

    /* ===== RIGHT CARD ===== */
    .rights-grid {
      display: grid;
      gap: 24px;
    }

    .right-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.3s;
    }

    .right-card:hover {
      border-color: rgba(100,200,255,0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .right-card-header {
      padding: 24px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      background: rgba(255,255,255,0.02);
      transition: background 0.3s;
    }

    .right-card-header:hover { background: rgba(255,255,255,0.04); }

    .right-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .right-card-title { flex: 1; }

    .right-card-title h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f3f4f6;
      margin-bottom: 4px;
    }

    .right-card-title p {
      font-size: 0.85rem;
      color: #6b7280;
    }

    .expand-icon {
      color: #6b7280;
      font-size: 1.2rem;
      transition: transform 0.3s;
    }

    .right-card.expanded .expand-icon { transform: rotate(180deg); }

    .right-card-body {
      display: none;
      padding: 0 28px 28px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .right-card.expanded .right-card-body { display: block; }

    .right-description {
      color: #9ca3af;
      font-size: 0.95rem;
      line-height: 1.75;
      margin: 20px 0;
    }

    /* Tabs inside card */
    .card-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .card-tab {
      padding: 8px 18px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #6b7280;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    .card-tab.active {
      background: rgba(59,130,246,0.15);
      border-color: #3b82f6;
      color: #60a5fa;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Links */
    .links-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .links-list li a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      color: #60a5fa;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.25s;
    }

    .links-list li a:hover {
      background: rgba(59,130,246,0.08);
      border-color: rgba(59,130,246,0.3);
      transform: translateX(-3px);
    }

    .link-icon { font-size: 1.1rem; }

    /* Action Plan */
    .action-steps {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .action-step {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .step-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .step-text {
      color: #d1d5db;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .step-text strong { color: #f3f4f6; }

    /* Restart */
    .restart-section {
      text-align: center;
      margin-top: 48px;
    }

    .btn-restart {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.15);
      color: #9ca3af;
      padding: 12px 32px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .btn-restart:hover {
      border-color: rgba(255,255,255,0.3);
      color: #fff;
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in { animation: fadeInUp 0.5s ease forwards; }

    @media (max-width: 600px) {
      .options-grid { grid-template-columns: 1fr; }
      .question-card { padding: 28px 20px; }
      header { padding: 16px 20px; }
      nav { display: none; }
    }
  </style>
</head>

  <nav>

</section>

  let answers = {};
  let currentQ = 0;
  let selectedMulti = [];

  function startQuiz() {
    document.getElementById("hero-section").style.display = "none";
    const qs = document.getElementById("quiz-section");
    qs.style.display = "block";
    qs.classList.add("animate-in");
    renderQuestion();
  }

  function renderQuestion() {
    const q = questions[currentQ];
    const total = questions.length;
    const pct = Math.round((currentQ / total) * 100);

    document.getElementById("progress-label").textContent = `שאלה ${currentQ + 1} מתוך ${total}`;
    document.getElementById("progress-percent").textContent = pct + "%";
    document.getElementById("progress-fill").style.width = pct + "%";

    let html = `
      <div class="question-card animate-in">
        <div class="question-number">שאלה ${currentQ + 1}</div>
        <h2>${q.title}</h2>
        <p class="subtitle">${q.subtitle}</p>
    `;

    if (q.type === "options") {
      const cols = q.cols === 1 ? "single-col" : "";
      html += `<div class="options-grid ${cols}">`;
      q.options.forEach(opt => {
        const sel = answers[q.id] === opt.value ? "selected" : "";
        html += `
          <button class="option-btn ${sel}" onclick="selectOption('${q.id}','${opt.value}',this)">
            <span class="option-icon">${opt.icon}</span>
            <div>
              <div>${opt.label}</div>
              ${opt.sub ? `<div style="font-size:0.78rem;color:#6b7280;margin-top:2px">${opt.sub}</div>` : ""}
            </div>
          </button>`;
      });
      html += `</div>`;
    }

    if (q.type === "multi") {
      html += `<div style="font-size:0.8rem;color:#6b7280;margin-bottom:14px">בחר עד ${q.max} תחומים</div>`;
      html += `<div class="options-grid">`;
      q.options.forEach(opt => {
        const sel = selectedMulti.includes(opt.value) ? "selected" : "";
        html += `
          <button class="option-btn ${sel}" onclick="toggleMulti('${opt.value}',this,${q.max})">
            <span class="option-icon">${opt.icon}</span>
            <span>${opt.label}</span>
          </button>`;
      });
      html += `</div>`;
    }

    if (q.type === "income") {
      html += `
        <input type="number" class="income-input" id="income-input"
          placeholder="${q.placeholder}"
          value="${answers.income || ""}"
          oninput="answers.income=this.value"
        />
        <div style="font-size:0.8rem;color:#6b7280;margin-top:10px;text-align:center">
          שכר מינימום: 5,880₪ | ממוצע שכר: ~13,000₪
        </div>`;
    }

    html += `</div>
    <div class="nav-buttons">
      ${currentQ > 0 ? `<button class="btn-back" onclick="prevQ()">→ חזור</button>` : ""}
      <button class="btn-next" onclick="nextQ()">
        ${currentQ === questions.length - 1 ? "✨ קבל המלצות" : "המשך ←"}
      </button>
    </div>`;

    document.getElementById("question-container").innerHTML = html;
  }

  function selectOption(qId, val, el) {
    answers[qId] = val;
    document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
    el.classList.add("selected");
  }

  function toggleMulti(val, el, max) {
    if (selectedMulti.includes(val)) {
      selectedMulti = selectedMulti.filter(v => v !== val);
      el.classList.remove("selected");
    } else {
      if (selectedMulti.length >= max) return;
      selectedMulti.push(val);
      el.classList.add("selected");
    }
    answers.interests = selectedMulti;
  }

  function nextQ() {
    if (currentQ < questions.length - 1) {
      currentQ++;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      showResults();
    }
  }

  function prevQ() {
    if (currentQ > 0) {
      currentQ--;
      renderQuestion();
    }
  }

  // ============================================================
  // RESULTS LOGIC
  // ============================================================
  function showResults() {
    document.getElementById("quiz-section").style.display = "none";
    const rs = document.getElementById("results-section");
    rs.style.display = "block";

    const relevantRights = getRelevantRights();
    const grid = document.getElementById("rights-grid");
    grid.innerHTML = "";

    relevantRights.forEach((rightKey, i) => {
      const r = RIGHTS_DB[rightKey];
      if (!r) return;
      grid.innerHTML += buildRightCard(r, i);
    });

    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function getRelevantRights() {
    const { age, status, transition, income, housing_status } = answers;
    let rights = ["health_basic"];

    if (age === "teen") rights.push("health_young");
    if (age === "young") rights.push("health_young", "army_rights");
    if (status === "employee" || status === "business") rights.push("employment_rights", "minimum_wage");
    if (status === "freelance" || status === "business") rights.push("freelance_rights");
    if (status === "student") rights.push("student_rights");
    if (status === "unemployed") rights.push("income_support", "minimum_wage");
    if (status === "army" || transition === "school_to_army" || transition === "army_to_study") rights.push("army_rights");
    if (transition === "work_to_business") rights.push("entrepreneurship", "freelance_rights");
    if (housing_status === "looking" || housing_status === "renting") rights.push("housing");

    const interests = answers.interests || [];
    if (interests.includes("business_int") || interests.includes("tech")) rights.push("entrepreneurship");
    if (income && parseInt(income) < 6000) rights.push("income_support");

    return [...new Set(rights)];
  }

  function buildRightCard(r, index) {
    const linksHtml = r.links.map(l =>
      `<li><a href="${l.url}" target="_blank" rel="noopener">
        <span class="link-icon">${l.icon}</span>${l.text}
        <span style="margin-right:auto;font-size:0.75rem;color:#374151">↗</span>
      </a></li>`
    ).join("");

    const stepsHtml = r.steps.map((s, i) =>
      `<li class="action-step">
        <div class="step-number">${i + 1}</div>
        <div class="step-text"><strong>${s.title}</strong><br/>${s.text}</div>
      </li>`
    ).join("");

    return `
      <div class="right-card" id="card-${index}">
        <div class="right-card-header" onclick="toggleCard(${index})">
          <div class="right-icon" style="background:${r.color}">
            <span style="color:${r.iconColor}">${r.icon}</span>
          </div>
          <div class="right-card-title">
            <h3>${r.title}</h3>
            <p>${r.tagline}</p>
          </div>
          <div class="expand-icon">▼</div>
        </div>
        <div class="right-card-body">
          <p class="right-description">${r.description}</p>
          <div class="card-tabs">
            <button class="card-tab active" onclick="switchTab(${index},'info',this)">📋 מידע</button>
            <button class="card-tab" onclick="switchTab(${index},'links',this)">🔗 קישורים</button>
            <button class="card-tab" onclick="switchTab(${index},'steps',this)">✅ תוכנית פעולה</button>
          </div>
          <div class="tab-content active" id="tab-${index}-info">
            <p style="color:#9ca3af;font-size:0.92rem;line-height:1.7">${r.description}</p>
          </div>
          <div class="tab-content" id="tab-${index}-links">
            <ul class="links-list">${linksHtml}</ul>
          </div>
          <div class="tab-content" id="tab-${index}-steps">
            <ul class="action-steps">${stepsHtml}</ul>
          </div>
        </div>
      </div>`;
  }

  function toggleCard(index) {
    const card = document.getElementById(`card-${index}`);
    card.classList.toggle("expanded");
  }

  function switchTab(cardIndex, tabName, el) {
    ["info","links","steps"].forEach(t => {
      const el2 = document.getElementById(`tab-${cardIndex}-${t}`);
      if (el2) el2.classList.remove("active");
    });
    document.getElementById(`tab-${cardIndex}-${tabName}`).classList.add("active");
    el.closest(".card-tabs").querySelectorAll(".card-tab").forEach(b => b.classList.remove("active"));
    el.classList.add("active");
  }

  function restart() {
    answers = {};
    selectedMulti = [];
    currentQ = 0;
    document.getElementById("results-section").style.display = "none";
    document.getElementById("hero-section").style.display = "block";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
</script>
</body>
</html>
