<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoot - המלצות אוניברסיטאות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Heebo', sans-serif; background: #f0f6ff; color: #1a2a4a; direction: rtl; }

  /* TOPBAR */
  .topbar {
    background: #fff;
    border-bottom: 2px solid #00b4d8;
    padding: 14px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,180,216,0.1);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .logo-text { font-size: 1.6rem; font-weight: 800; color: #00b4d8; }
  .logo-sub { font-size: 0.75rem; color: #64748b; font-weight: 400; }
  .topbar-title { font-size: 1.1rem; font-weight: 600; color: #1a2a4a; }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 65px); }

  /* SIDEBAR */
  .sidebar {
    width: 270px;
    background: #fff;
    border-left: 2px solid #e0f0ff;
    padding: 24px 16px;
    position: sticky;
    top: 65px;
    height: calc(100vh - 65px);
    overflow-y: auto;
  }
  .sidebar h3 {
    font-size: 0.85rem;
    color: #64748b;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    padding-right: 8px;
  }
  .sidebar-btn {
    display: block;
    width: 100%;
    text-align: right;
    padding: 11px 14px;
    border: none;
    background: none;
    cursor: pointer;
    border-radius: 10px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.95rem;
    color: #1a2a4a;
    font-weight: 500;
    transition: all 0.2s;
    margin-bottom: 4px;
  }
  .sidebar-btn:hover { background: #e0f7ff; color: #00b4d8; }
  .sidebar-btn.active { background: #00b4d8; color: #fff; font-weight: 700; }
  .sidebar-divider { border: none; border-top: 1px solid #e0f0ff; margin: 14px 0; }

  /* MAIN */
  .main { flex: 1; padding: 30px; }
  .page-header { margin-bottom: 28px; }
  .page-header h1 { font-size: 1.9rem; font-weight: 800; color: #1a2a4a; margin-bottom: 6px; }
  .page-header p { color: #64748b; font-size: 1rem; }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 26px;
  }
  .filter-btn {
    padding: 8px 18px;
    border-radius: 50px;
    border: 2px solid #00b4d8;
    background: #fff;
    color: #00b4d8;
    font-family: 'Heebo', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active { background: #00b4d8; color: #fff; }

  /* CHECK SCORES BOX */
  .scores-box {
    background: #fff;
    border: 2px solid #00b4d8;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .scores-box label { font-weight: 600; font-size: 0.95rem; color: #1a2a4a; }
  .scores-box input {
    padding: 8px 14px;
    border: 2px solid #e0f0ff;
    border-radius: 10px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.95rem;
    width: 120px;
    outline: none;
    transition: border 0.2s;
  }
  .scores-box input:focus { border-color: #00b4d8; }
  .check-btn {
    padding: 9px 22px;
    background: #00b4d8;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Heebo', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .check-btn:hover { background: #0096b4; }

  /* CARDS GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 22px;
  }

  /* CARD */
  .uni-card {
    background: #fff;
    border-radius: 16px;
    border: 2px solid #e0f0ff;
    padding: 22px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }
  .uni-card:hover { border-color: #00b4d8; transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,180,216,0.15); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
  .card-icon { font-size: 2.2rem; }
  .card-badge {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 50px;
    background: #e0f7ff;
    color: #00b4d8;
  }
  .card-badge.research { background: #e8f4fd; color: #0077b6; }
  .card-badge.college { background: #fff0e8; color: #e07000; }
  .card-badge.tech { background: #eaf7ee; color: #2d8a4e; }
  .card-name { font-size: 1.15rem; font-weight: 800; color: #1a2a4a; margin-bottom: 4px; }
  .card-location { font-size: 0.85rem; color: #64748b; margin-bottom: 12px; }
  .card-desc { font-size: 0.9rem; color: #4a5568; line-height: 1.6; margin-bottom: 14px; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 0.78rem;
    padding: 3px 10px;
    border-radius: 50px;
    background: #f0f6ff;
    color: #1a2a4a;
    font-weight: 500;
  }
  .fit-indicator {
    position: absolute;
    top: 14px;
    left: 14px;
    font-size: 1.3rem;
  }
  .card-link-row {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-link {
    font-size: 0.85rem;
    color: #00b4d8;
    font-weight: 600;
    text-decoration: none;
  }
  .card-link:hover { text-decoration: underline; }
  .details-btn {
    font-size: 0.85rem;
    font-weight: 700;
    color: #fff;
    background: #00b4d8;
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    transition: background 0.2s;
  }
  .details-btn:hover { background: #0096b4; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px;
    width: 90%;
    max-width: 720px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 32px;
    position: relative;
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn { from { transform: scale(0.9); opacity:0; } to { transform: scale(1); opacity:1; } }
  .modal-close {
    position: absolute;
    top: 16px;
    left: 16px;
    background: #f0f6ff;
    border: none;
    border-radius: 50%;
    width: 34px;
    height: 34px;
    font-size: 1.1rem;
    cursor: pointer;
    font-weight: 700;
    color: #1a2a4a;
    transition: background 0.2s;
  }
  .modal-close:hover { background: #e0f0ff; }
  .modal-header { margin-bottom: 22px; }
  .modal-title { font-size: 1.5rem; font-weight: 800; color: #1a2a4a; }
  .modal-subtitle { font-size: 0.9rem; color: #64748b; margin-top: 4px; }

  /* TABS */
  .tabs { display: flex; gap: 6px; margin-bottom: 24px; border-bottom: 2px solid #e0f0ff; padding-bottom: 0; }
  .tab-btn {
    padding: 10px 18px;
    border: none;
    background: none;
    font-family: 'Heebo', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: #64748b;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }
  .tab-btn.active { color: #00b4d8; border-bottom-color: #00b4d8; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* PROS CONS */
  .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
  .pros, .cons {
    padding: 16px;
    border-radius: 12px;
  }
  .pros { background: #eafaf1; }
  .cons { background: #fef3f2; }
  .pros h4 { color: #2d8a4e; font-size: 0.95rem; margin-bottom: 10px; }
  .cons h4 { color: #e53e3e; font-size: 0.95rem; margin-bottom: 10px; }
  .pros li, .cons li { font-size: 0.88rem; line-height: 1.7; color: #4a5568; list-style: none; padding-right: 0; }
  .pros li::before { content: "✓ "; color: #2d8a4e; font-weight: 700; }
  .cons li::before { content: "✗ "; color: #e53e3e; font-weight: 700; }

  /* DEGREES TABLE */
  .degrees-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  .degrees-table th {
    background: #00b4d8;
    color: #fff;
    padding: 10px 14px;
    font-size: 0.9rem;
    font-weight: 600;
    text-align: right;
  }
  .degrees-table td { padding: 10px 14px; font-size: 0.88rem; border-bottom: 1px solid #e0f0ff; color: #4a5568; }
  .degrees-table tr:hover td { background: #f0f9ff; }
  .req-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 600;
    background: #e0f7ff;
    color: #00b4d8;
    margin: 2px;
  }
  .req-tag.high { background: #fce8e8; color: #e53e3e; }
  .req-tag.med { background: #fff3cd; color: #856404; }
  .req-tag.low { background: #eafaf1; color: #2d8a4e; }

  /* FIT METER */
  .fit-section { margin-top: 16px; }
  .fit-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .fit-label { width: 160px; font-size: 0.9rem; font-weight: 600; color: #1a2a4a; flex-shrink: 0; }
  .fit-bar { flex: 1; height: 10px; background: #e0f0ff; border-radius: 50px; overflow: hidden; }
  .fit-fill { height: 100%; border-radius: 50px; background: linear-gradient(90deg, #00b4d8, #0077b6); transition: width 0.8s ease; }
  .fit-pct { width: 40px; font-size: 0.88rem; font-weight: 700; color: #00b4d8; }

  /* MOBILE */
  @media(max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 18px; }
    .pros-cons { grid-template-columns: 1fr; }
    .scores-box { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>

    <!-- CARDS GRID -->

  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

let currentFilter = 'all';
let userBagrut = 0;
let userPsycho = 0;
let fitChecked = false;

function renderCards(filter = 'all') {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  let filtered = universities;
  if (filter !== 'all') {
    filtered = universities.filter(u =>
      u.fields.includes(filter) ||
      u.type === filter ||
      u.city === filter
    );
  }
  filtered.forEach(uni => {
    const fitIcon = getFitIcon(uni);
    const card = document.createElement('div');
    card.className = 'uni-card';
    card.setAttribute('data-fields', uni.fields.join(','));
    card.setAttribute('data-type', uni.type);
    card.setAttribute('data-city', uni.city);
    card.innerHTML = `
      ${fitChecked ? `<div class="fit-indicator">${fitIcon}</div>` : ''}
      <div class="card-top">
        <div class="card-icon">${uni.icon}</div>
        <span class="card-badge ${uni.badgeClass}">${uni.badge}</span>
      </div>
      <div class="card-name">${uni.name}</div>
      <div class="card-location">📍 ${uni.city}</div>
      <div class="card-desc">${uni.desc}</div>
      <div class="card-tags">${uni.fields.map(f => `<span class="tag">${f}</span>`).join('')}</div>
      <div class="card-link-row">
        <a class="card-link" href="${uni.website}" target="_blank">🌐 לאתר הרשמי</a>
        <button class="details-btn" onclick="openModal(${uni.id})">פרטים מלאים ←</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function getFitIcon(uni) {
  if (!fitChecked || (!userBagrut && !userPsycho)) return '';
  const minBagrut = Math.min(...uni.degrees.map(d => d.bagrut));
  const minPsycho = Math.min(...uni.degrees.filter(d => d.psycho > 0).map(d => d.psycho).concat([999]));
  const bagrutOk = userBagrut >= minBagrut - 5;
  const psychoOk = userPsycho >= minPsycho - 30 || minPsycho === 999;
  if (bagrutOk && psychoOk) return '✅';
  if (bagrutOk || psychoOk) return '⚠️';
  return '❌';
}

function checkFit() {
  userBagrut = parseFloat(document.getElementById('bagrut').value) || 0;
  userPsycho = parseFloat(document.getElementById('psycho').value) || 0;
  fitChecked = true;
  renderCards(currentFilter);
}

function filterCards(field, btn) {
  currentFilter = field;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(field === 'all' ? 'all' : field);
}

function filterSidebar(type, btn) {
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(type);
}

function filterCity(city, btn) {
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = city;
  renderCards(city);
}

function filterField(field, btn) {
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = field;
  renderCards(field);
}

  const modal = document.getElementById('modalBody');

    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('overview',this)">📋 סקירה כללית</button>
      <button class="tab-btn" onclick="switchTab('degrees',this)">🎓 תארים ודרישות</button>
      <button class="tab-btn" onclick="switchTab('fit',this)">🎯 האם אני מתאים?</button>
    </div>
    <div id="tab-overview" class="tab-content active">
      <p style="color:#4a5568;line-height:1.7;margin-bottom:16px">${uni.desc}</p>
      <div style="background:#f0f9ff;border-radius:12px;padding:16px;margin-bottom:16px">

          <ul>${uni.cons.map(c => `<li>${c}</li>`).join('')}</ul>
        </div>
      </div>
    </div>
    <div id="tab-degrees" class="tab-content">
      <p style="color:#64748b;margin-bottom:14px;font-size:0.9rem">* ממוצע בגרות על סקלה של 1–120 (100 = ממוצע של 85 בגרות רגיל)</p>
      <table class="degrees-table">
        <thead>
          <tr>
            <th>תואר</th>
            <th>שנים</th>
            <th>ממוצע בגרות</th>
            <th>פסיכומטרי</th>
            <th>הערות</th>
          </tr>
        </thead>
        <tbody>
          ${uni.degrees.map(d => `
            <tr>
              <td><strong>${d.name}</strong></td>
              <td>${d.years} שנים</td>
              <td><span class="req-tag ${d.bagrut >= 103 ? 'high' : d.bagrut >= 93 ? 'med' : 'low'}">${d.bagrut}</span></td>
              <td>${d.psycho > 0 ? `<span class="req-tag ${d.psycho >= 690 ? 'high' : d.psycho >= 620 ? 'med' : 'low'}">${d.psycho}</span>` : '<span class="req-tag low">לא נדרש</span>'}</td>
              <td style="color:#64748b">${d.note || '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    <div id="tab-fit" class="tab-content">
      ${fitChecked ? generateFitContent(uni) : `
        <div style="text-align:center;padding:30px;color:#64748b">
          <div style="font-size:2.5rem;margin-bottom:12px">📊</div>
          <p>הכנס את הציונים שלך למעלה כדי לראות את ההתאמה שלך לכל תואר</p>
        </div>
      `}
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function generateFitContent(uni) {
  let html = '<div class="fit-section">';
  uni.degrees.forEach(d => {
    let fit = 0;
    if (userBagrut > 0) fit += Math.min(50, Math.max(0, 50 - (d.bagrut - userBagrut) * 3));
    if (d.psycho > 0 && userPsycho > 0) fit += Math.min(50, Math.max(0, 50 - (d.psycho - userPsycho) * 0.1));
    else if (d.psycho === 0) fit += 50;
    fit = Math.min(100, Math.max(0, Math.round(fit)));
    const color = fit >= 70 ? '#2d8a4e' : fit >= 40 ? '#e07000' : '#e53e3e';
    html += `
      <div class="fit-row">
        <div class="fit-label">${d.name}</div>
        <div class="fit-bar"><div class="fit-fill" style="width:${fit}%;background:${color}"></div></div>
        <div class="fit-pct" style="color:${color}">${fit}%</div>
      </div>
    `;
  });
  html += '</div>';
  return html;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
}
